<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NexusAI-BankGuard — Neural Credit System</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cyan:#00F5FF;--cyan2:#00C4CC;--cyan3:rgba(0,245,255,0.08);
  --green:#00FF88;--green2:#00CC6A;
  --red:#FF2D55;--amber:#FFB800;--purple:#BF5FFF;
  --bg:#050810;--bg2:#080D1A;--bg3:#0D1525;--bg4:#111C30;
  --border:rgba(0,245,255,0.15);--border2:rgba(0,245,255,0.35);
  --text:#C8D8F0;--text2:#7A9BC4;--text3:#3A5278;
  --mono:'Share Tech Mono',monospace;
  --head:'Orbitron',sans-serif;
  --body:'Rajdhani',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--cyan2)}

/* SCANLINE OVERLAY */
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}

/* CIRCUIT BG */
#circuit-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.35}

#root{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:64px;border-bottom:1px solid var(--border);background:rgba(5,8,16,0.92);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;align-items:center;gap:14px}
.logo-hex{width:38px;height:38px;position:relative;display:flex;align-items:center;justify-content:center}
.logo-hex svg{width:38px;height:38px}
.logo-name{font-family:var(--head);font-size:17px;font-weight:700;color:var(--cyan);letter-spacing:0.12em;text-transform:uppercase}
.logo-tagline{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.2em;margin-top:2px}
.header-right{display:flex;align-items:center;gap:16px}
.sys-status{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;color:var(--green)}
.sys-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:breathe 2s infinite}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:0.5}}
.header-stat{font-family:var(--mono);font-size:10px;color:var(--text3);padding:0 12px;border-left:1px solid var(--border)}
.header-stat span{color:var(--cyan);margin-left:4px}
.corner-tag{font-family:var(--mono);font-size:9px;color:var(--text3);border:1px solid var(--border);padding:4px 10px;letter-spacing:0.1em}

/* ── SCREEN ── */
.screen{flex:1;padding:32px;max-width:920px;margin:0 auto;width:100%;animation:bootIn 0.35s ease}
@keyframes bootIn{from{opacity:0;clip-path:inset(8px 0 8px 0)}to{opacity:1;clip-path:inset(0)}}

/* ── HERO BANNER ── */
.hero-banner{position:relative;height:220px;border:1px solid var(--border);overflow:hidden;margin-bottom:28px;background:var(--bg2)}
.hero-img{width:100%;height:100%;object-fit:cover;opacity:0.35;filter:saturate(0.4) hue-rotate(160deg)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(5,8,16,0.95) 0%,rgba(5,8,16,0.6) 60%,transparent 100%)}
.hero-content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:32px}
.hero-eyebrow{font-family:var(--mono);font-size:10px;color:var(--cyan);letter-spacing:0.25em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.hero-eyebrow::before{content:'';width:20px;height:1px;background:var(--cyan)}
.hero-title{font-family:var(--head);font-size:30px;font-weight:700;color:#fff;letter-spacing:0.05em;line-height:1.1;text-transform:uppercase;margin-bottom:10px}
.hero-title .accent{color:var(--cyan)}
.hero-sub{font-family:var(--mono);font-size:11px;color:var(--text2);line-height:1.7;max-width:420px}
.hero-corner{position:absolute;bottom:14px;right:18px;font-family:var(--mono);font-size:9px;color:var(--text3)}
/* corner brackets */
.hero-tl,.hero-tr,.hero-bl,.hero-br{position:absolute;width:16px;height:16px}
.hero-tl{top:10px;left:10px;border-top:1px solid var(--cyan);border-left:1px solid var(--cyan)}
.hero-tr{top:10px;right:10px;border-top:1px solid var(--cyan);border-right:1px solid var(--cyan)}
.hero-bl{bottom:10px;left:10px;border-bottom:1px solid var(--cyan);border-left:1px solid var(--cyan)}
.hero-br{bottom:10px;right:10px;border-bottom:1px solid var(--cyan);border-right:1px solid var(--cyan)}

/* ── STAT ROW ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat-block{background:var(--bg2);border:1px solid var(--border);padding:14px 16px;position:relative;overflow:hidden}
.stat-block::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),transparent)}
.stat-val{font-family:var(--head);font-size:22px;color:var(--cyan);font-weight:700;letter-spacing:0.05em}
.stat-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:0.15em;text-transform:uppercase;margin-top:4px}
.stat-corner{position:absolute;bottom:8px;right:10px;font-family:var(--mono);font-size:8px;color:var(--text3)}

/* ── FORM ── */
.panel{background:var(--bg2);border:1px solid var(--border);padding:28px;margin-bottom:20px;position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--cyan),var(--cyan2),transparent)}
.panel-header{display:flex;align-items:center;gap:10px;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.panel-icon{width:28px;height:28px;border:1px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--cyan)}
.panel-title{font-family:var(--mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--cyan)}
.panel-id{font-family:var(--mono);font-size:9px;color:var(--text3);margin-left:auto}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
.flabel{font-family:var(--mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--cyan2);display:flex;align-items:center;gap:6px}
.flabel::before{content:'//';color:var(--text3)}
.finput{background:var(--bg3);border:1px solid var(--border);padding:11px 14px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;transition:all 0.2s;width:100%}
.finput:focus{border-color:var(--cyan);background:var(--bg4);box-shadow:0 0 0 1px rgba(0,245,255,0.1),inset 0 0 20px rgba(0,245,255,0.03)}
.finput::placeholder{color:var(--text3)}
select.finput option{background:var(--bg3)}
.fhint{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:2px}
.ferr{font-family:var(--mono);font-size:9px;color:var(--red);background:rgba(255,45,85,0.08);border:1px solid rgba(255,45,85,0.2);padding:6px 10px;margin-top:4px}

/* ── BUTTONS ── */
.btn-prime{width:100%;padding:15px;background:transparent;border:1px solid var(--cyan);font-family:var(--head);font-size:13px;font-weight:600;color:var(--cyan);letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:all 0.25s}
.btn-prime::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,245,255,0.1),transparent);transition:left 0.4s}
.btn-prime:hover{background:rgba(0,245,255,0.06);box-shadow:0 0 20px rgba(0,245,255,0.2)}
.btn-prime:hover::before{left:100%}
.btn-sec{padding:10px 20px;background:transparent;border:1px solid var(--border2);font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2);cursor:pointer;transition:all 0.2s}
.btn-sec:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-green{padding:14px 28px;background:transparent;border:1px solid var(--green);font-family:var(--head);font-size:12px;font-weight:600;color:var(--green);letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.btn-green:hover{background:rgba(0,255,136,0.06);box-shadow:0 0 16px rgba(0,255,136,0.2)}

/* ── PIPELINE ── */
.pipe-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.pipe-title{font-family:var(--head);font-size:22px;font-weight:700;color:var(--cyan);letter-spacing:0.1em;text-transform:uppercase}
.pipe-meta{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px}
.pipe-timer{font-family:var(--head);font-size:32px;font-weight:700;color:var(--green);letter-spacing:0.05em;text-align:right}
.pipe-timer-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);text-align:right;margin-top:2px}

.agent-card{background:var(--bg2);border:1px solid var(--border);padding:18px 20px;margin-bottom:10px;position:relative;transition:all 0.3s;overflow:hidden}
.agent-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:all 0.3s}
.agent-card.active{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,245,255,0.08)}
.agent-card.active::after{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.agent-card.done{border-color:rgba(0,255,136,0.25)}
.agent-card.done::after{background:var(--green)}
.agent-card.pending{opacity:0.35}
.agent-scan{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scan 2s linear infinite;display:none}
.agent-card.active .agent-scan{display:block}
@keyframes scan{0%{transform:translateY(0)}100%{transform:translateY(60px)}}
.agent-top{display:flex;align-items:center;gap:14px}
.agent-num{font-family:var(--head);font-size:11px;color:var(--text3);min-width:28px}
.agent-card.active .agent-num{color:var(--cyan)}
.agent-card.done .agent-num{color:var(--green)}
.agent-info{flex:1}
.agent-name{font-family:var(--head);font-size:14px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text);margin-bottom:2px}
.agent-card.active .agent-name{color:var(--cyan)}
.agent-card.done .agent-name{color:var(--green)}
.agent-desc{font-family:var(--mono);font-size:9px;color:var(--text3)}
.agent-status{font-family:var(--mono);font-size:10px;display:flex;align-items:center;gap:6px;min-width:80px;justify-content:flex-end}
.spinner{width:14px;height:14px;border:1.5px solid rgba(0,245,255,0.2);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.agent-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.tag{font-family:var(--mono);font-size:8px;letter-spacing:0.1em;padding:2px 8px;border:1px solid}
.tag-in{color:#4C8EE8;border-color:rgba(76,142,232,0.3);background:rgba(76,142,232,0.05)}
.tag-out{color:var(--cyan2);border-color:rgba(0,196,204,0.3);background:rgba(0,196,204,0.04)}
.tag-done{color:var(--green);border-color:rgba(0,255,136,0.3);background:rgba(0,255,136,0.04)}
.tag-run{color:var(--amber);border-color:rgba(255,184,0,0.3);background:rgba(255,184,0,0.04);animation:tagblink 1s infinite}
@keyframes tagblink{0%,100%{opacity:1}50%{opacity:0.5}}
.prog-bar{height:2px;background:var(--bg3);margin-top:12px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--cyan2));transition:width 0.08s linear;box-shadow:0 0 6px var(--cyan)}

/* ── AUDIT LOG ── */
.audit-box{background:var(--bg);border:1px solid var(--border);padding:14px;font-family:var(--mono);font-size:10px;color:var(--text3);max-height:140px;overflow-y:auto;margin-top:16px;line-height:1.9}
.aline{display:flex;gap:10px}
.atime{color:var(--cyan2);min-width:54px;flex-shrink:0}
.amsg{color:var(--text3)}

/* ── DECISION ── */
.decision-banner{position:relative;border:1px solid var(--border);overflow:hidden;margin-bottom:24px;height:160px}
.decision-img{width:100%;height:100%;object-fit:cover;opacity:0.2;filter:saturate(0.3) hue-rotate(160deg)}
.decision-overlay-approved{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,255,136,0.12),rgba(5,8,16,0.9))}
.decision-overlay-rejected{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,45,85,0.12),rgba(5,8,16,0.9))}
.decision-overlay-review{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,184,0,0.12),rgba(5,8,16,0.9))}
.decision-inner{position:absolute;inset:0;display:flex;align-items:center;padding:32px;gap:24px}
.decision-icon-box{width:72px;height:72px;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.decision-icon-box.approved{border-color:var(--green);color:var(--green);box-shadow:0 0 20px rgba(0,255,136,0.2)}
.decision-icon-box.rejected{border-color:var(--red);color:var(--red);box-shadow:0 0 20px rgba(255,45,85,0.2)}
.decision-icon-box.review{border-color:var(--amber);color:var(--amber);box-shadow:0 0 20px rgba(255,184,0,0.2)}
.decision-text-wrap{}
.decision-code{font-family:var(--mono);font-size:9px;letter-spacing:0.2em;margin-bottom:6px}
.decision-code.approved{color:var(--green)}
.decision-code.rejected{color:var(--red)}
.decision-code.review{color:var(--amber)}
.decision-label{font-family:var(--head);font-size:28px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase}
.decision-label.approved{color:var(--green)}
.decision-label.rejected{color:var(--red)}
.decision-label.review{color:var(--amber)}
.decision-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:6px}
.corner-bracket{position:absolute;width:14px;height:14px}
.cb-tl{top:10px;left:10px;border-top:1px solid;border-left:1px solid}
.cb-tr{top:10px;right:10px;border-top:1px solid;border-right:1px solid}
.cb-bl{bottom:10px;left:10px;border-bottom:1px solid;border-left:1px solid}
.cb-br{bottom:10px;right:10px;border-bottom:1px solid;border-right:1px solid}
.cb-approved{border-color:var(--green)}
.cb-rejected{border-color:var(--red)}
.cb-review{border-color:var(--amber)}

/* METRIC GRID */
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.metric-cell{background:var(--bg2);border:1px solid var(--border);padding:14px;position:relative}
.metric-cell::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--cyan),transparent)}
.m-lbl{font-family:var(--mono);font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.m-val{font-family:var(--head);font-size:20px;font-weight:700;letter-spacing:0.05em}
.m-val.green{color:var(--green)}
.m-val.red{color:var(--red)}
.m-val.cyan{color:var(--cyan)}
.m-val.amber{color:var(--amber)}
.m-sub{font-family:var(--mono);font-size:8px;color:var(--text3);margin-top:3px}

/* TRACE */
.trace-panel{background:var(--bg2);border:1px solid var(--border);padding:20px;margin-bottom:16px}
.trace-hdr{font-family:var(--mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--cyan2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.trace-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
.trace-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.trace-row:last-child{border-bottom:none}
.t-agent{font-family:var(--mono);font-size:9px;color:var(--cyan);min-width:72px;letter-spacing:0.1em}
.t-text{font-family:var(--mono);font-size:10px;color:var(--text2);line-height:1.5}

/* APPEAL */
.alert-box{border:1px solid;padding:16px;margin-top:14px}
.alert-box.red{border-color:rgba(255,45,85,0.3);background:rgba(255,45,85,0.04)}
.alert-box.amber{border-color:rgba(255,184,0,0.3);background:rgba(255,184,0,0.04)}
.alert-title{font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:8px}
.alert-title.red{color:var(--red)}
.alert-title.amber{color:var(--amber)}
.alert-body{font-family:var(--mono);font-size:10px;color:var(--text2);line-height:1.7}
.alert-ref{font-family:var(--mono);font-size:10px;color:var(--cyan);margin-top:8px}

/* RECEIPT */
.receipt-panel{background:var(--bg2);border:1px solid var(--border2);padding:0;margin-bottom:20px;position:relative;overflow:hidden}
.receipt-top-bar{height:3px;background:linear-gradient(90deg,var(--cyan),var(--green),var(--cyan))}
.receipt-body{padding:28px}
.receipt-hdr{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:20px;border-bottom:1px dashed var(--border2);margin-bottom:20px}
.receipt-logo-txt{font-family:var(--head);font-size:18px;color:var(--cyan);font-weight:700;letter-spacing:0.12em}
.receipt-doc-type{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:0.2em;text-transform:uppercase;margin-top:3px}
.receipt-ref{font-family:var(--mono);font-size:10px;color:var(--text3);text-align:right;line-height:1.8}
.receipt-amount-block{background:var(--bg3);border:1px solid var(--border2);padding:18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.receipt-amount-lbl{font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3)}
.receipt-amount{font-family:var(--head);font-size:34px;font-weight:700;color:var(--green);letter-spacing:0.05em}
.receipt-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.receipt-table td{padding:9px 0;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;vertical-align:top}
.receipt-table td:first-child{color:var(--text3);width:45%;letter-spacing:0.08em}
.receipt-table td:last-child{color:var(--text);font-weight:500}
.receipt-footer{display:flex;justify-content:space-between;align-items:center;padding-top:18px;border-top:1px dashed var(--border2)}
.stamp{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--green);padding:5px 14px;font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--green)}
.receipt-legal{font-family:var(--mono);font-size:8px;color:var(--text3);text-align:right;line-height:1.8}

.action-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--cyan);padding:12px 18px;font-family:var(--mono);font-size:10px;color:var(--cyan);letter-spacing:0.1em;animation:toastIn 0.3s ease;z-index:9998}
@keyframes toastIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:640px){
  .form-grid,.stat-row,.metric-grid{grid-template-columns:1fr}
  .fg.full{grid-column:1}
  .receipt-hdr{flex-direction:column;gap:12px}
  .hero-title{font-size:22px}
  .screen{padding:16px}
  .header{padding:0 16px}
}
</style>
</head>
<body>

<!-- CIRCUIT SVG BACKGROUND -->
<svg id="circuit-bg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g stroke="#00F5FF" stroke-width="0.5" fill="none" opacity="0.6" filter="url(#glow)">
    <!-- Horizontal lines -->
    <line x1="0" y1="80" x2="300" y2="80"/><line x1="340" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="200" x2="150" y2="200"/><line x1="190" y1="200" x2="500" y2="200"/>

<script>
const AGENTS=[
  {id:1,name:'Intake & Risk Coordinator',desc:'Parses data, normalizes inputs, structures profile',
   inputs:['Business name','Owner ID','Loan amount','Revenue'],
   outputs:['Structured profile','Completeness score'],duration:1500},
  {id:2,name:'Document Verification Agent',desc:'Verifies document completeness, name and address consistency',
   inputs:['Application','Intake summary'],
   outputs:['Verification status','Verified documents'],duration:1500},
  {id:3,name:'Fraud Intelligence Agent',desc:'Checks known fraud blacklists and registers',
   inputs:['Application','Intake summary','Doc verification'],
   outputs:['Fraud risk level','Fraud signals'],duration:1500},
  {id:4,name:'Business Validation Agent',desc:'Queries business registry and validates active history',
   inputs:['Application','Intake summary','Doc verification'],
   outputs:['Business status','Previous loans'],duration:1500},
  {id:5,name:'Risk Scoring Agent',desc:'Evaluates creditworthiness, debt-to-income, and risk score',
   inputs:['Application','Intake summary','Doc verification','Fraud intelligence','Business validation'],
   outputs:['Repayment risk level','Risk score','Recommendation'],duration:1500},
];

let S={
  screen:'form',
  form:{biz:'',owner:'',amount:'',revenue:'',purpose:'',industry:'',lang:'en'},
  cur:0,prog:0,results:[],
  decision:null,start:null,elapsed:0,
  ref:null,audit:[],errors:{}
};
let pTimer=null,eTimer=null;
let apiData=null;
let apiError=null;
let isConnected=null;


const $=id=>document.getElementById(id);
const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
  ? 'http://127.0.0.1:8006' 
  : window.location.origin;
const genRef=()=>'NBG-'+Date.now().toString(36).toUpperCase().slice(-6)+'-'+Math.floor(Math.random()*9000+1000);
const fmt=n=>new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR',maximumFractionDigits:0}).format(n);
const fmtT=ms=>(ms/1000).toFixed(1)+'s';
const ts=()=>new Date().toLocaleTimeString('en-US',{hour12:false});

function validate(){
  const f=S.form,e={};
  if(!f.biz.trim())e.biz='FIELD REQUIRED';
  if(!f.owner.trim())e.owner='FIELD REQUIRED';
  if(!f.amount||isNaN(f.amount)||+f.amount<10000)e.amount='MIN ₹10,000';
  if(!f.revenue||isNaN(f.revenue)||+f.revenue<1000)e.revenue='FIELD REQUIRED';
  S.errors=e;return Object.keys(e).length===0;
}

function log(m){S.audit.push({t:ts(),m});}
function toast(msg){
  const el=document.createElement('div');
  el.className='toast';el.textContent='[ '+msg+' ]';
  document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity 0.3s';setTimeout(()=>el.remove(),300)},2500);
}

function startPipeline(){
  if(!validate()){render();return;}
  S={...S,screen:'pipeline',cur:0,prog:0,results:[],decision:null,audit:[],ref:genRef(),start:Date.now(),elapsed:0};
  apiData = null;
  apiError = null;
  log('Application '+S.ref+' initialised');
  render();
  
  const payload = {
    business_name: S.form.biz,
    owner_name: S.form.owner,
    loan_amount: parseFloat(S.form.amount),
    monthly_revenue: parseFloat(S.form.revenue),
    industry: S.form.industry || 'General Trade',
    loan_purpose: S.form.purpose || 'Working capital'
  };
  console.log('[NexusAI-BankGuard] Request payload', payload);

  eTimer=setInterval(()=>{
    S.elapsed=Date.now()-S.start;
    const v=$('etimer');
    if(v)v.textContent=fmtT(S.elapsed);
  },100);

  fetch(`${BACKEND_URL}/analyze-loan`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(payload),
    mode: 'cors'
  })
  .then(res => {
    if (!res.ok) {
      return res.json().then(errData => {
        throw new Error(errData.detail || 'Server error ' + res.status);
      }).catch(() => {
        throw new Error('Server connection error (' + res.status + ')');
      });
    }
    return res.json();
  })
  .then(data => {
    console.log('[NexusAI-BankGuard] API response', data);
    apiData = data;
    log('Backend analysis payload received');
  })
  .catch(err => {
    console.error('[NexusAI-BankGuard] API error', err);
    handleApiError(err.message || 'Unknown backend error');
  });

  runAgent(0);
}

function handleApiError(message){
  apiError = message;
  clearInterval(pTimer);
  clearInterval(eTimer);
  toast('API ERROR: ' + message);
  render();
}

function runAgent(i){
  if(apiError){
    return;
  }
  if(i>=AGENTS.length){
    checkAndFinish();
    return;
  }
  S.cur=i;S.prog=0;
  log('AGENT-'+(i+1)+' ['+AGENTS[i].name+'] INITIALISED');
  render();
  const dur=AGENTS[i].duration,step=50;let e=0;
  pTimer=setInterval(()=>{
    if(apiError){
      clearInterval(pTimer);
      return;
    }
    e+=step;S.prog=Math.min(100,Math.round(e/dur*100));
    const b=$('pb'+i);if(b)b.style.width=S.prog+'%';
    const p=$('pp'+i);if(p)p.textContent=S.prog+'%';
    if(e>=dur){
      clearInterval(pTimer);
      S.results.push({i,done:true});
      log('AGENT-'+(i+1)+' ['+AGENTS[i].name+'] COMPLETE');
      render();
      setTimeout(()=>runAgent(i+1),250);
    }
  },step);
}

function checkAndFinish(){
  if (apiData) {
    finishWithData(apiData);
    return;
  }
  if (apiError) {
    clearInterval(eTimer);
    console.warn('[NexusAI-BankGuard] Stopped pipeline due to backend error');
    return;
  }
  setTimeout(checkAndFinish, 500);
}

function finishWithData(data){
  clearInterval(eTimer);
  
  const final_resp = data.final_response || data;
  
  let outcome = 'review';
  const rec = final_resp.final_recommendation;
  if (rec === 'Approve') {
    outcome = 'approved';
  } else if (rec === 'Reject') {
    outcome = 'rejected';
  } else {
    outcome = 'review';
  }
  
  S.ref = final_resp.reference_id || S.ref;
  
  S.decision = {
    outcome: outcome,
    rs: final_resp.risk_score ?? 0,
    fs: final_resp.fraud_score ?? 0,
    r: final_resp.loan_to_revenue_ratio ?? 0,
    trace: Array.isArray(final_resp.reasoning_trace) ? final_resp.reasoning_trace.map(t => ({ a: t.agent, t: t.text })) : [],
    business_status: final_resp.business_status || 'UNKNOWN',
    fraud_risk: final_resp.fraud_risk || 'UNKNOWN',
    confidence: final_resp.confidence ?? 0,
    next_action: final_resp.next_action || ''
  };
  
  console.log('[NexusAI-BankGuard] Final decision rendered:', S.decision);
  
  S.audit = Array.isArray(final_resp.audit_log) ? final_resp.audit_log.map(item => ({ t: item.timestamp, m: item.message })) : [];
  
  log('DECISION: ' + outcome.toUpperCase());
  log('AUDIT SEALED — ' + S.audit.length + ' ENTRIES');
  
  setTimeout(() => {
    S.screen = 'decision';
    render();
  }, 500);
}

    const isDone=i<S.cur;
    const isAct=i===S.cur;
    const cls=isDone?'done':isAct?'active':'pending';
    const inT=ag.inputs.map(t=>`<span class="tag tag-in">&gt; ${t}</span>`).join('');
    const outT=ag.outputs.map(t=>`<span class="tag ${isDone?'tag-done':isAct?'tag-run':'tag-out'}">&lt; ${t}</span>`).join('');
    const st=isDone?`<span style="color:var(--green);font-family:var(--mono);font-size:10px">OK · ${fmtT(ag.duration)}</span>`:isAct?`<span style="display:flex;align-items:center;gap:6px"><span class="spinner"></span><span id="pp${i}" style="font-family:var(--mono);font-size:10px;color:var(--amber)">0%</span></span>`:`<span style="font-family:var(--mono);font-size:10px;color:var(--text3)">STANDBY</span>`;
    const pb=isAct?`<div class="prog-bar"><div class="prog-fill" id="pb${i}" style="width:0%"></div></div>`:'';
    return `<div class="agent-card ${cls}"><div class="agent-scan"></div>
      <div class="agent-top">
        <div class="agent-num">A-${String(i+1).padStart(2,'0')}</div>
        <div class="agent-info"><div class="agent-name">${ag.name}</div><div class="agent-desc">// ${ag.desc}</div></div>
        <div class="agent-status">${st}</div>
      </div>
      <div class="agent-tags">${inT}${outT}</div>
      ${pb}
    </div>`;
  }).join('');
  const aLines=S.audit.map(l=>`<div class="aline"><span class="atime">${l.t}</span><span class="amsg">${l.m}</span></div>`).join('');
  const errorHtml = apiError ? `<div class="alert-box red" style="margin-top:20px"><div class="alert-title red">// BACKEND ERROR</div><div class="alert-body">${apiError}</div><div class="action-row"><button class="btn-sec" onclick="reset()">← BACK TO FORM</button></div></div>` : '';
  return `<div class="screen">
    <div class="pipe-header">
      <div>
        <div class="pipe-title">ASSESSMENT PIPELINE</div>
        <div class="pipe-meta">// REF: ${S.ref} · ${done}/${AGENTS.length} AGENTS COMPLETE</div>
      </div>
      <div>
        <div class="pipe-timer" id="etimer">${fmtT(S.elapsed)}</div>
        <div class="pipe-timer-lbl">ELAPSED</div>
      </div>
    </div>
    ${agHtml}
    <div class="panel" style="margin-top:16px;padding:16px">
      <div class="panel-header" style="margin-bottom:10px"><div class="panel-title">COMPLIANCE AUDIT LOG</div><div class="panel-id">LIVE</div></div>
      <div class="audit-box">${aLines}</div>
    </div>
    ${errorHtml}
  </div>`;
}

function renderDecision(){
  const d=S.decision,f=S.form;
  const o=d.outcome;
  const icon=o==='approved'?'✓':o==='rejected'?'✕':'◈';
  const lbl=o==='approved'?'SANCTIONED':o==='rejected'?'DECLINED':'MANUAL REVIEW';
  const sub=d.next_action || (o==='approved'?'FUNDS RELEASE: T+1 BUSINESS DAY':o==='rejected'?'APPEAL PATH AVAILABLE — 30 DAYS':'ASSIGNED TO HUMAN CREDIT OFFICER');
  const trH=d.trace.map(t=>`<div class="trace-row"><span class="t-agent">${t.a}</span><span class="t-text">${t.t}</span></div>`).join('');
  const aH=S.audit.map(l=>`<div class="aline"><span class="atime">${l.t}</span><span class="amsg">${l.m}</span></div>`).join('');
  const alertHtml=o==='rejected'?`<div class="alert-box red"><div class="alert-title red">// APPEAL PATHWAY ACTIVE</div><div class="alert-body">Submit additional financial documentation within 30 days. Human credit review within 2 business days.</div><div class="alert-ref">APPEAL REF: ${S.ref}-APL</div></div>`:o==='review'?`<div class="alert-box amber"><div class="alert-title amber">// HUMAN REVIEW INITIATED</div><div class="alert-body">Senior credit officer assigned. SLA: 4 business hours. Track status with your case reference.</div><div class="alert-ref">CASE REF: ${S.ref}-HRV</div></div>`:'';
  const approveBtn=o==='approved'?`<button class="btn-green" onclick="S.screen='receipt';render()">VIEW SANCTION DOCUMENT &gt;&gt;</button>`:'';
  const rScore=d.rs<50?'green':d.rs<75?'amber':'red';
  const fraudColor=d.fraud_risk==='High'?'red':d.fraud_risk==='Medium'?'amber':'green';
  const confidenceColor=d.confidence>=0.75?'green':d.confidence>=0.5?'amber':'red';
  const rRatio=d.r<4?'green':d.r<7?'amber':'red';
  return `<div class="screen">
    <div class="decision-banner">
      <img class="decision-img" src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1200&q=80" alt="technology"/>
      <div class="decision-overlay-${o}"></div>
      <div class="corner-bracket cb-tl cb-${o}"></div>
      <div class="corner-bracket cb-tr cb-${o}"></div>
      <div class="corner-bracket cb-bl cb-${o}"></div>
      <div class="corner-bracket cb-br cb-${o}"></div>
      <div class="decision-inner">
        <div class="decision-icon-box ${o}">${icon}</div>
        <div class="decision-text-wrap">
          <div class="decision-code ${o}">// NEURAL DECISION ENGINE · ${new Date().toISOString()}</div>
          <div class="decision-label ${o}">${lbl}</div>
          <div class="decision-sub">${sub}</div>
        </div>
      </div>
    </div>
    <div class="metric-grid">
      <div class="metric-cell"><div class="m-lbl">Risk Score</div><div class="m-val ${rScore}">${d.rs}<span style="font-size:12px;opacity:0.5">/100</span></div><div class="m-sub">ML MODEL OUTPUT</div></div>
      <div class="metric-cell"><div class="m-lbl">Fraud Risk</div><div class="m-val ${fraudColor}">${d.fraud_risk || 'N/A'}</div><div class="m-sub">BACKEND FRAUD LEVEL</div></div>
      <div class="metric-cell"><div class="m-lbl">Business Status</div><div class="m-val cyan">${d.business_status || 'UNKNOWN'}</div><div class="m-sub">BACKEND VALIDATION</div></div>
      <div class="metric-cell"><div class="m-lbl">Confidence</div><div class="m-val ${confidenceColor}">${Math.round((d.confidence ?? 0)*100)}<span style="font-size:12px;opacity:0.5">%</span></div><div class="m-sub">DECISION CONFIDENCE</div></div>
      <div class="metric-cell"><div class="m-lbl">Process Time</div><div class="m-val cyan">${fmtT(S.elapsed)}</div><div class="m-sub">END-TO-END</div></div>
      <div class="metric-cell"><div class="m-lbl">Loan Amount</div><div class="m-val cyan" style="font-size:15px">${fmt(f.amount)}</div><div class="m-sub">REQUESTED</div></div>
    </div>
    <div class="trace-panel"><div class="trace-hdr">AGENT REASONING TRACE</div>${trH}</div>
    ${alertHtml}
    <div class="trace-panel" style="margin-top:12px"><div class="trace-hdr">COMPLIANCE AUDIT LOG</div><div class="audit-box" style="margin-top:0">${aH}</div></div>
    <div class="action-row">${approveBtn}<button class="btn-sec" onclick="dlAudit()">⬇ EXPORT AUDIT LOG</button><button class="btn-sec" onclick="reset()">← NEW APPLICATION</button></div>
  </div>`;
}

function renderReceipt(){
  const f=S.form,d=S.decision;
  return `<div class="screen">
    <div class="receipt-panel">
      <div class="receipt-top-bar"></div>
      <div class="receipt-body">
        <div class="receipt-hdr">
          <div>
            <div class="receipt-logo-txt">⬡ NEXUSAI-BANKGUARD</div>
            <div class="receipt-doc-type">OFFICIAL SANCTION DOCUMENT · NEURAL CREDIT SYSTEM</div>
          </div>
          <div class="receipt-ref">
            <div>REF: ${S.ref}</div>
            <div>${new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'})}</div>
            <div>STATUS: <span style="color:var(--green)">SANCTIONED</span></div>
          </div>
        </div>
        <div class="receipt-amount-block">
          <div>
            <div class="receipt-amount-lbl">Total Sanctioned Amount</div>
            <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:3px">DISBURSEMENT: T+1 BUSINESS DAY</div>
          </div>
          <div class="receipt-amount">${fmt(f.amount)}</div>
        </div>
        <table class="receipt-table">
          <tr><td>BUSINESS ENTITY</td><td>${f.biz}</td></tr>
          <tr><td>PROMOTER ID</td><td>${f.owner}</td></tr>
          <tr><td>INDUSTRY SECTOR</td><td>${f.industry||'GENERAL TRADE'}</td></tr>
          <tr><td>MONTHLY REVENUE</td><td>${fmt(f.revenue)}</td></tr>
          <tr><td>RISK SCORE</td><td><span style="color:var(--green)">${d.rs}/100 — WITHIN POLICY</span></td></tr>
          <tr><td>FRAUD SCORE</td><td><span style="color:var(--green)">${d.fs}/100 — CLEAR</span></td></tr>
          <tr><td>LOAN/REVENUE RATIO</td><td>${d.r}×</td></tr>
          <tr><td>LOAN PURPOSE</td><td>${f.purpose||'WORKING CAPITAL'}</td></tr>
          <tr><td>OUTPUT LANGUAGE</td><td>${f.lang.toUpperCase()}</td></tr>
          <tr><td>PROCESSING TIME</td><td>${fmtT(S.elapsed)}</td></tr>
          <tr><td>AGENTS DEPLOYED</td><td>5/5 — ALL CLEAR</td></tr>
        </table>
        <div class="receipt-footer">
          <div class="stamp">✓ APPROVED & SANCTIONED</div>
          <div class="receipt-legal">NEXUSAI-NEXUSAI-BANKGUARD NEURAL CREDIT SYSTEM<br/>RBI FAIR PRACTICES CODE COMPLIANT<br/>${S.ref}</div>
        </div>
      </div>
    </div>
    <div class="action-row">
      <button class="btn-green" onclick="dlReceipt()">⬇ DOWNLOAD SANCTION DOCUMENT</button>
      <button class="btn-sec" onclick="dlAudit()">⬇ EXPORT AUDIT LOG</button>
      <button class="btn-sec" onclick="S.screen='decision';render()">← BACK TO DECISION</button>
      <button class="btn-sec" onclick="reset()">NEW APPLICATION</button>
    </div>
  </div>`;
}

function render(){
  document.getElementById('root').innerHTML=renderHeader()+(
    S.screen==='form'?renderForm():
    S.screen==='pipeline'?renderPipeline():
    S.screen==='decision'?renderDecision():
    renderReceipt()
  );
}

function checkBackendConnection() {
  fetch(`${BACKEND_URL}/health`)
    .then(res => {
      if(!res.ok) throw new Error('Response status: '+res.status);
      return res.json();
    })
    .then(data => {
      isConnected = data.status === 'online';
      render();
      console.log('[NexusAI-BankGuard] Frontend is currently CONNECTED to the backend at ' + BACKEND_URL);
    })
    .catch(err => {
      console.error('Connection check failed:', err);
      isConnected = false;
      render();
      console.warn('[NexusAI-BankGuard] Frontend is currently running STANDALONE (Backend disconnected at ' + BACKEND_URL + ')');
    });
}

render();
checkBackendConnection();
</script>
</body>
</html>
