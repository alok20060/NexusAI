<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NexusAI-BankGuard — Neural Credit System</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- CIRCUIT SVG BACKGROUND -->
<svg id="circuit-bg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g stroke="#00F5FF" stroke-width="0.5" fill="none" opacity="0.6" filter="url(#glow)">
    <!-- Horizontal lines -->
    <line x1="0" y1="80" x2="300" y2="80"/><line x1="340" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="200" x2="150" y2="200"/><line x1="190" y1="200" x2="500" y2="200"/>
    <line x1="700" y1="200" x2="1200" y2="200"/>
    <line x1="400" y1="320" x2="800" y2="320"/><line x1="850" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="480" x2="250" y2="480"/><line x1="600" y1="480" x2="900" y2="480"/>
    <line x1="100" y1="600" x2="400" y2="600"/><line x1="800" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="720" x2="500" y2="720"/><line x1="700" y1="720" x2="1200" y2="720"/>
    <!-- Vertical lines -->
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="100" y1="240" x2="100" y2="600"/>
    <line x1="300" y1="80" x2="300" y2="480"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="700" y1="200" x2="700" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="320"/><line x1="900" y1="380" x2="900" y2="800"/>
    <line x1="1100" y1="200" x2="1100" y2="720"/>
    <!-- Nodes (dots at junctions) -->
    <circle cx="100" cy="80" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="300" cy="80" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="300" cy="200" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="300" cy="320" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="300" cy="480" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="500" cy="200" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="500" cy="320" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="700" cy="200" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="700" cy="320" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="700" cy="480" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="700" cy="600" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="900" cy="200" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="900" cy="320" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="900" cy="600" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="1100" cy="200" r="3" fill="#00F5FF" opacity="0.8"/>
    <circle cx="1100" cy="600" r="3" fill="#00F5FF" opacity="0.8"/>
    <!-- Small component squares -->
    <rect x="90" y="220" width="20" height="20" opacity="0.5"/>
    <rect x="490" y="190" width="20" height="20" opacity="0.5"/>
    <rect x="890" y="310" width="20" height="20" opacity="0.5"/>
    <rect x="290" y="470" width="20" height="20" opacity="0.5"/>
    <rect x="690" y="590" width="20" height="20" opacity="0.5"/>
    <!-- IC chip outlines -->
    <rect x="120" y="340" width="60" height="40" opacity="0.3"/>
    <line x1="120" y1="350" x2="100" y2="350" opacity="0.4"/>
    <line x1="120" y1="360" x2="100" y2="360" opacity="0.4"/>
    <line x1="120" y1="370" x2="100" y2="370" opacity="0.4"/>
    <line x1="180" y1="350" x2="200" y2="350" opacity="0.4"/>
    <line x1="180" y1="360" x2="200" y2="360" opacity="0.4"/>
    <line x1="180" y1="370" x2="200" y2="370" opacity="0.4"/>
    <rect x="820" y="440" width="60" height="40" opacity="0.3"/>
    <line x1="820" y1="450" x2="800" y2="450" opacity="0.4"/>
    <line x1="820" y1="460" x2="800" y2="460" opacity="0.4"/>
    <line x1="880" y1="450" x2="900" y2="450" opacity="0.4"/>
    <line x1="880" y1="460" x2="900" y2="460" opacity="0.4"/>
  </g>
  <!-- Accent nodes in green -->
  <g fill="#00FF88" opacity="0.7">
    <circle cx="500" cy="80" r="2.5"/>
    <circle cx="800" cy="320" r="2.5"/>
    <circle cx="400" cy="600" r="2.5"/>
  </g>
</svg>

<div id="root"></div>

<script src="script.js"></script>
</body>
</html>
