const RiskGauge=({score=0,animateKey=0})=>{
  const [current,setCurrent]=useState(0);
  const W=220,H=130,cx=W/2,cy=H-10,r=95;
  const startAngle=Math.PI,endAngle=0;
  const scoreAngle=startAngle-(score/100)*Math.PI;

  const toXY=(a,radius=r)=>({x:cx+radius*Math.cos(a),y:cy-radius*Math.sin(a)});

// ─── SMART FILL PARSER ───────────────────────────────────────────────────────
function parseApplicationText(text) {
  const t = text.toLowerCase();
  const result = {};

  // Extract loan amount — supports lakh/crore, ₹, Rs, INR, numbers
  const amtPatterns = [
    /(?:₹|rs\.?|inr|rupees?)\s*([0-9,]+(?:\.[0-9]+)?)\s*(lakh|lac|crore|cr|k)?/i,
    /([0-9,]+(?:\.[0-9]+)?)\s*(lakh|lac|crore|cr|k)?\s*(?:rupees?|₹|inr|rs\.?)/i,
    /loan(?:\s+of|\s+amount(?:\s+of)?)?\s*(?:₹|rs\.?|inr)?\s*([0-9,]+(?:\.[0-9]+)?)\s*(lakh|lac|crore|cr|k)?/i,
  ];
  for (const p of amtPatterns) {
    const m = text.match(p);
    if (m) {
      let val = parseFloat(m[1].replace(/,/g, ''));
      const unit = (m[2]||'').toLowerCase();
      if (unit==='lakh'||unit==='lac') val *= 100000;
      else if (unit==='crore'||unit==='cr') val *= 10000000;
      else if (unit==='k') val *= 1000;
      result.amount = String(Math.round(val));
      break;
    }
  }

  // Extract revenue
  const revPatterns = [
    /(?:monthly\s+)?(?:revenue|turnover|sales|income)\s+(?:of\s+)?(?:₹|rs\.?|inr)?\s*([0-9,]+(?:\.[0-9]+)?)\s*(lakh|lac|crore|cr|k)?/i,
    /(?:earn(?:ing|s)?|mak(?:e|ing)|generat(?:e|ing))\s+(?:₹|rs\.?|inr)?\s*([0-9,]+(?:\.[0-9]+)?)\s*(lakh|lac|crore|cr|k)?\s*(?:per\s+month|monthly)?/i,
  ];
  for (const p of revPatterns) {
    const m = text.match(p);
    if (m) {
      let val = parseFloat(m[1].replace(/,/g, ''));
      const unit = (m[2]||'').toLowerCase();
      if (unit==='lakh'||unit==='lac') val *= 100000;
      else if (unit==='crore'||unit==='cr') val *= 10000000;
      else if (unit==='k') val *= 1000;
      result.revenue = String(Math.round(val));
      break;
    }
  }

  // Business age in years
  const ageMatch = text.match(/(\d+)[\-\s]year(?:s)?(?:[\-\s]old)?\s+(?:business|company|firm|shop|store|enterprise)/i)
    || text.match(/(?:business|company|firm|shop|store)\s+(?:for|since|of)\s+(\d+)\s+year/i)
    || text.match(/running\s+(?:for|since)?\s*(\d+)\s+year/i)
    || text.match(/(\d+)\s+year[s]?\s+(?:of\s+)?(?:experience|operation|business)/i);
  if (ageMatch) result.years = ageMatch[1];

  // Industry detection
  const industryMap = [
    {keys:['textile','cloth','garment','fabric','apparel','fashion'],'val':'Manufacturing'},
    {keys:['grocery','supermarket','kirana','fmcg','retail','shop','store','mart'],'val':'Retail & FMCG'},
    {keys:['restaurant','hotel','hospitality','food','catering','bakery','cafe','dhaba'],'val':'Hospitality'},
    {keys:['software','tech','it ','digital','app','saas','startup','technology'],'val':'Services & IT'},
    {keys:['farm','agri','agriculture','crop','dairy','poultry','fishery','horticulture'],'val':'Agriculture & Allied'},
    {keys:['hospital','clinic','pharmacy','medical','health','diagnostic','lab'],'val':'Healthcare'},
    {keys:['manufactur','factory','production','assembl','machine'],'val':'Manufacturing'},
    {keys:['trade','import','export','wholesale','distribution','supply'],'val':'General Trade'},
  ];
  for (const {keys,val} of industryMap) {
    if (keys.some(k=>t.includes(k))) { result.industry = val; break; }
  }

  // Business name
  const bizPatterns = [
    /(?:my\s+(?:business|company|firm|shop|store)\s+(?:is\s+)?(?:called|named)?\s+)([A-Z][\w\s&.'-]{2,50}(?:Pvt\.?\s+Ltd\.?|Ltd\.?|LLP|Inc\.?|Co\.?)?)/i,
    /([A-Z][\w\s&.'-]{2,40}(?:Pvt\.?\s+Ltd\.?|Ltd\.?|LLP|Enterprises?|Traders?|Industries|Solutions|Services))/,
  ];
  for (const p of bizPatterns) {
    const m = text.match(p);
    if (m) { result.biz = m[1].trim(); break; }
  }

  // Owner name — "I am X" / "my name is X" / "owner: X"
  const ownerMatch = text.match(/(?:i am|my name is|owner(?:\s+name)?(?:\s+is)?)\s+([A-Z][a-z]+(?:\s+[A-Z][a-z]+){1,2})/i)
    || text.match(/([A-Z][a-z]+(?:\s+[A-Z][a-z]+){1,2})(?:\s+(?:here|speaking))?[,.]?\s+(?:applying|looking|seeking|need)/i);
  if (ownerMatch) result.owner = ownerMatch[1].trim();

  // Loan purpose keywords
  const purposeMap = [
    {keys:['working capital','working-capital','cash flow','liquidity'],'val':'Working capital expansion'},
    {keys:['equipment','machinery','machine','plant','tool'],'val':'Equipment purchase'},
    {keys:['expand','expansion','scale','grow','new branch','new outlet'],'val':'Business expansion'},
    {keys:['inventory','stock','raw material','purchase goods'],'val':'Inventory procurement'},
    {keys:['renovation','refurbish','interior','remodel'],'val':'Renovation & infrastructure'},
    {keys:['export','import','trade finance'],'val':'Trade finance'},
  ];
  for (const {keys,val} of purposeMap) {
    if (keys.some(k=>t.includes(k))) { result.purpose = val; break; }
  }
  if (!result.purpose) {
    const purMatch = text.match(/(?:for|to)\s+(?:my\s+)?([a-zA-Z\s]{4,40}?)(?:\.|,|$)/i);
    if (purMatch) result.purpose = purMatch[1].trim();
  }

  return result;
}

const UploadPanel=({applicationId,applicantType,requiredDocs,onBack,onSubmit})=>{
  const [checklist,setChecklist]=useState([]);
  const [uploading,setUploading]=useState({});
  const [loading,setLoading]=useState(true);

  const fetchChecklist=useCallback(async()=>{
    try{
      const res=await fetch(BACKEND+'/application-documents/'+applicationId);
      if(res.ok){
        const data=await res.json();
        setChecklist(data);
      }
    }catch(e){
      console.error('Error fetching checklist:',e);
    }finally{
      setLoading(false);
    }
  },[applicationId]);

  useEffect(()=>{
    fetchChecklist();
  },[fetchChecklist]);

  const handleUpload=async(docType,file)=>{
    if(!file)return;
    setUploading(prev=>({...prev,[docType]:true}));
    try{
      const formData=new FormData();
      formData.append('application_id',applicationId);
      formData.append('document_type',docType);
      formData.append('file',file);
      
      const res=await fetch(BACKEND+'/upload-document',{
        method:'POST',
        body:formData
      });
      if(!res.ok){
        const errData=await res.json().catch(()=>({}));
        throw new Error(errData.detail || 'Upload failed');
      }
      await fetchChecklist();
    }catch(e){
      console.error(e);
      alert('Upload failed: '+e.message);
    }finally{
      setUploading(prev=>({...prev,[docType]:false}));
    }
  };

  const requiredDocsList = checklist.filter(d=>d.required);
  const totalRequired = requiredDocsList.length;
  const uploadedRequired = requiredDocsList.filter(d=>['Uploaded','Processing','Verified'].includes(d.upload_status)).length;
  const progressPercent = totalRequired > 0 ? Math.round((uploadedRequired/totalRequired)*100) : 0;

  return React.createElement('div',{className:'metric-card',style:{padding:28,maxWidth:1100,margin:'0 auto'}},
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}},
      React.createElement('div',null,
        React.createElement('div',{style:{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.4)',letterSpacing:'0.12em',textTransform:'uppercase'}},'Step 2 of 3 · Verification uploads'),
        React.createElement('h3',{style:{fontSize:20,fontWeight:800,color:'#fff',marginTop:4}},'Upload Supporting Documents')

      React.createElement('div',{className:'badge badge-purple',style:{fontSize:11}},`Application ID: ${applicationId}`)
    ),
    React.createElement('div',{style:{background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:12,padding:16,marginBottom:20}},
      React.createElement('div',{style:{fontSize:13,fontWeight:600,color:'#60A5FA'}},`Applicant Profile: ${applicantType}`),
      React.createElement('div',{style:{fontSize:11,color:'rgba(255,255,255,0.4)',marginTop:4}},'Underwriting criteria requires the following documents. Please upload files in PDF, PNG, JPG, or JPEG format (max 10MB).')
    ),
    
    // Progress Bar
    React.createElement('div',{style:{marginBottom:24}},
      React.createElement('div',{style:{display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:600,color:'rgba(255,255,255,0.5)',marginBottom:6}},
        React.createElement('span',null,'Required Checklist Progress'),
        React.createElement('span',null,`${uploadedRequired} of ${totalRequired} required uploaded (${progressPercent}%)`)
      ),
      React.createElement('div',{style:{width:'100%',height:8,background:'rgba(255,255,255,0.06)',borderRadius:4,overflow:'hidden'}},
        React.createElement('div',{style:{width:`${progressPercent}%`,height:'100%',background:'linear-gradient(90deg,#10B981,#3B82F6)',borderRadius:4,transition:'width 0.3s ease'}})
      )
    ),
    
    // Documents grid of 12 categories
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(240px, 1fr))',gap:16,marginBottom:24}},
      checklist.map((doc,idx)=>{
        const isUploaded = ['Uploaded', 'Processing', 'Verified'].includes(doc.upload_status);
        const isUploading = uploading[doc.document_type];
        const status = doc.upload_status || 'Pending';
        
        let cardStyle = {
          display: 'flex',
          flexDirection: 'column',
          justifyContent: 'space-between',
          padding: 16,
          borderRadius: 16,
          minHeight: 165,
          transition: 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)',
          background: 'rgba(255,255,255,0.02)',

                fontSize: 10,

  return React.createElement('div',{className:'fade-in',style:{display:'flex',flexDirection:'column',gap:20}},
    // Header
    React.createElement('div',{style:{textAlign:'center',padding:'32px 0'}},
      React.createElement('div',{style:{width:64,height:64,borderRadius:'50%',background:'rgba(59,130,246,0.1)',border:'1px solid rgba(59,130,246,0.3)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',boxShadow:'0 0 30px rgba(59,130,246,0.3)'}},
        React.createElement('div',{className:'spinner',style:{width:28,height:28}})
      ),
      React.createElement('h2',{style:{fontSize:22,fontWeight:700,color:'#E2E8F0',marginBottom:6}},'Neural Assessment Running'),
      React.createElement('div',{style:{fontSize:13,color:'rgba(255,255,255,0.4)'}},form.biz+' · '+((elapsed/1000).toFixed(1))+'s elapsed'),
    ),
    // Agents
    React.createElement('div',{className:'metric-card'},
      React.createElement('div',{style:{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.4)',letterSpacing:'0.1em',marginBottom:20,textTransform:'uppercase'}},'⬡ Agent Pipeline — Live'),
      React.createElement(AgentTimeline,{stage,results:Array(stage).fill(1)})
    )
  );
};

    React.createElement('div',{style:{borderRadius:14,background:'rgba(3,7,18,0.6)',border:'1px solid rgba(255,255,255,0.07)',padding:'14px 16px',boxShadow:'inset 0 1px 0 rgba(255,255,255,0.04)'}},

          React.createElement('div',{style:{width:7,height:7,borderRadius:'50%',background:r.dot,boxShadow:`0 0 6px ${r.dot}`,className:r.pulse?'status-dot-pulse':undefined}}),

// ─── ROOT APP ────────────────────────────────────────────────────────────────
const App=()=>{
  const [nav,setNav]=useState('dashboard');
  const [screen,setScreen]=useState('form'); // form | upload | pipeline | results
  const [loading,setLoading]=useState(false);
  const [pipelineStage,setPipelineStage]=useState(0);
  const [apiData,setApiData]=useState(null);
  const [formData,setFormData]=useState({});
  const [startTime,setStartTime]=useState(null);
  const [elapsed,setElapsed]=useState(0);
  const [isConnected,setIsConnected]=useState(null);
  
  // Phase 2 Wizard states
  const [applicationId,setApplicationId]=useState('');
  const [applicantType,setApplicantType]=useState('');
  const [requiredDocs,setRequiredDocs]=useState([]);

  // Connection check
  useEffect(()=>{
    fetch(BACKEND+'/health')
      .then(r=>{
        if(!r.ok) throw new Error('Response status: '+r.status);
        return r.json();
      })
      .then(data=>{
        setIsConnected(data.status==='online');
      })
      .catch(err=>{
        console.error('Connection check failed:', err);
        setIsConnected(false);
      });
  },[]);

  const handleSubmit=async(form)=>{
    setFormData(form);
    setLoading(true);
    try{
      const payload={
        business_name:form.biz,
        owner_name:form.owner,
        loan_amount:+form.amount,
        monthly_revenue:+form.revenue || 0.0,
        years_in_business:+form.years||5,
        industry:form.industry||'General Trade',
        loan_purpose:form.purpose||'Working capital'
      };
      const res=await fetch(BACKEND+'/initialize-application',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      });
      if(!res.ok)throw new Error('Initialization error '+res.status);
      const data=await res.json();
      setApplicationId(data.application_id);
      setApplicantType(data.applicant_type);
      setRequiredDocs(data.required_documents);
      setScreen('upload');
    }catch(e){
      console.error(e);
      alert('Initialization failed: '+e.message);
    }finally{
      setLoading(false);
    }
  };

  const handleSubmitAnalysis=async(appId)=>{
    setLoading(true);
    setScreen('pipeline');
    setPipelineStage(0);
    const t0=Date.now();
    setStartTime(t0);
    // Animate agents (7 stages)
    const runAgents=async()=>{
      for(let i=0;i<7;i++){
        setPipelineStage(i);
        await new Promise(r=>setTimeout(r,650));
      }
    };
    runAgents();
    try{
      const payload={
        business_name:formData.biz,
        owner_name:formData.owner,
        loan_amount:+formData.amount,
        monthly_revenue:+formData.revenue || 0.0,
        years_in_business:+formData.years||5,
        industry:formData.industry||'General Trade',
        loan_purpose:formData.purpose||'Working capital',
        application_id:appId
      };
      const res=await fetch(BACKEND+'/analyze-loan',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      });
      if(!res.ok)throw new Error('API error '+res.status);
      const data=await res.json();
      setPipelineStage(7);
      await new Promise(r=>setTimeout(r,600));
      setApiData(data);
      setElapsed(Date.now()-t0);
      setScreen('results');
    }catch(e){
      console.error(e);
      alert('Backend error: '+e.message);
      setScreen('upload');
    }finally{
      setLoading(false);
    }
  };

  const handleReset=()=>{
    setScreen('form');setApiData(null);setPipelineStage(0);setElapsed(0);
    setApplicationId('');setApplicantType('');setRequiredDocs([]);
  };

  // Nav handler — only switches between real screens
  const handleNav=id=>{
    setNav(id);
    if(id==='dashboard'||id==='applications'){
      setScreen('form');setApiData(null);setPipelineStage(0);setElapsed(0);
    } else if(id==='review_queue'){
      setScreen('review_queue');
    } else if(id==='demo'){
      setScreen('form');setApiData(null);setPipelineStage(0);setElapsed(0);
      // signal LoanForm to open demo panel
      setNav('demo');
    } else if(id==='about'){
      setScreen('about');
    }
  };

  return React.createElement('div',{style:{display:'flex',minHeight:'100vh',background:'#070B1F'}},
    // Sidebar
    React.createElement(Sidebar,{active:nav,onNav:handleNav,screen,isConnected}),
    // Main content
    React.createElement('div',{style:{flex:1,display:'flex',flexDirection:'column',minHeight:'100vh',overflow:'auto'}},
      React.createElement(TopBar,{isConnected}),
      // Page content
      React.createElement('div',{style:{flex:1,padding:28}},
        // Form screen
        screen==='form'&&React.createElement('div',{style:{maxWidth:900,margin:'0 auto'}},
          // Hero card
          React.createElement('div',{className:'metric-card',style:{background:'linear-gradient(135deg,rgba(37,99,235,0.12),rgba(124,58,237,0.08))',border:'1px solid rgba(59,130,246,0.2)',marginBottom:24,padding:28}},
            React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr auto',gap:24,alignItems:'center'}},
              React.createElement('div',null,
                React.createElement('div',{style:{fontSize:10,letterSpacing:'0.2em',color:'rgba(59,130,246,0.8)',marginBottom:8,textTransform:'uppercase',fontFamily:'JetBrains Mono, monospace'}},'// MULTI-AGENT AI PLATFORM'),
                React.createElement('h2',{style:{fontSize:28,fontWeight:800,lineHeight:1.2,marginBottom:10}},
                  React.createElement('span',{className:'gradient-text'},'SME Loan Intelligence'),
                  React.createElement('br'),React.createElement('span',{style:{color:'#E2E8F0'}},'Assessment System')
                ),
                React.createElement('div',{style:{fontSize:13,color:'rgba(255,255,255,0.4)',lineHeight:1.6,maxWidth:420}},'5-agent neural pipeline · 40+ risk signals · Real-time MongoDB fraud detection · Full audit trail')
              ),
              React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,minWidth:240}},
                [['< 4s','Decision SLA'],['5','AI Agents'],['40+','Data Signals'],['100%','Audit Trail']].map(([v,l],i)=>
                  React.createElement('div',{key:i,style:{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:12,padding:'12px 14px',textAlign:'center'}},
                    React.createElement('div',{className:'gradient-text',style:{fontSize:20,fontWeight:700,marginBottom:2}},v),
                    React.createElement('div',{style:{fontSize:9,color:'rgba(255,255,255,0.3)',letterSpacing:'0.1em',textTransform:'uppercase'}},l)
                  )
                )
              )
            )
          ),
          // Form card
          React.createElement('div',{className:'metric-card',style:{padding:28}},
            React.createElement('div',{style:{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.4)',letterSpacing:'0.12em',marginBottom:20,textTransform:'uppercase',display:'flex',alignItems:'center',gap:8}},
              React.createElement(Icon,{name:'apps',size:13,color:'rgba(255,255,255,0.3)'}),'Application Input Module'
            ),
            React.createElement(LoanForm,{onSubmit:handleSubmit,loading})
          )
        ),
        // Upload screen
        screen==='upload'&&React.createElement('div',{style:{maxWidth:700,margin:'0 auto'}},
          React.createElement(UploadPanel,{
            applicationId,
            applicantType,
            requiredDocs,
            onBack:()=>setScreen('form'),
            onSubmit:handleSubmitAnalysis
          })
        ),
        // Pipeline screen
        screen==='pipeline'&&React.createElement('div',{style:{maxWidth:700,margin:'0 auto'}},
          React.createElement(PipelineView,{stage:pipelineStage,form:formData,startTime})
        ),
        // Results screen
        screen==='results'&&apiData&&React.createElement('div',{style:{maxWidth:1100,margin:'0 auto'}},
          React.createElement(ResultsDashboard,{data:apiData,form:formData,elapsed,onReset:handleReset})
        ),
        // Review Queue screen
        screen==='review_queue'&&React.createElement('div',{style:{maxWidth:1100,margin:'0 auto'}},
          React.createElement(ReviewQueuePanel)
        ),
        // About screen
        screen==='about'&&React.createElement('div',{style:{maxWidth:700,margin:'0 auto'},className:'fade-in'},
          React.createElement('div',{className:'metric-card',style:{padding:36,textAlign:'center'}},
            React.createElement('div',{style:{width:64,height:64,borderRadius:18,background:'linear-gradient(135deg,#2563EB,#7C3AED)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',boxShadow:'0 0 30px rgba(37,99,235,0.5)'}},
              React.createElement('span',{style:{fontSize:24,fontWeight:800,color:'#fff'}},'NBG')
            ),
            React.createElement('h2',{style:{fontSize:26,fontWeight:800,marginBottom:8}},React.createElement('span',{className:'gradient-text'},'NexusAI-BankGuard')),
            React.createElement('div',{style:{fontSize:12,color:'rgba(255,255,255,0.4)',letterSpacing:'0.15em',marginBottom:24}},'NEURAL CREDIT SYSTEM v2.4'),
            React.createElement('div',{style:{fontSize:14,color:'rgba(255,255,255,0.5)',lineHeight:1.8,maxWidth:480,margin:'0 auto',marginBottom:28}},
              'NexusAI-BankGuard is a multi-agent AI platform for SME loan decisioning. It runs 5 specialized agents in sequence — intake, document verification, fraud intelligence, business validation, and risk scoring — to produce a fully auditable credit decision in under 4 seconds.'
            ),
            React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:28}},
              [['5','AI Agents'],['40+','Risk Signals'],['< 4s','Decision Time'],['100%','Audit Trail']].map(([v,l],i)=>
                React.createElement('div',{key:i,style:{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:14,padding:'16px 12px',textAlign:'center'}},
                  React.createElement('div',{className:'gradient-text',style:{fontSize:22,fontWeight:700,marginBottom:4}},v),
                  React.createElement('div',{style:{fontSize:10,color:'rgba(255,255,255,0.3)',letterSpacing:'0.1em',textTransform:'uppercase'}},l)
                )
              )
            ),
            React.createElement('div',{style:{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}},
              [['MongoDB Atlas','#10B981'],['FastAPI Backend','#3B82F6'],['React 18 UI','#818CF8'],['MCP Tools','#F59E0B'],['5-Agent Pipeline','#EF4444']].map(([t,c],i)=>
                React.createElement('span',{key:i,style:{padding:'5px 14px',borderRadius:100,fontSize:11,fontWeight:600,background:`${c}18`,color:c,border:`1px solid ${c}33`}},t)
              )
            ),
            React.createElement('div',{style:{marginTop:28,fontSize:11,color:'rgba(255,255,255,0.2)',fontFamily:'JetBrains Mono, monospace'}},
              `API: http://127.0.0.1:8006 · Frontend: http://localhost:3000`
            )
          )
        )
      )
    )
  );
};

// Mount
const root=ReactDOM.createRoot(document.getElementById('app'));
root.render(React.createElement(App));
</script>
